<style>
  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --surface-2: #0A0D12;
    --surface-3: #1C222B;
    --border: #262C36;
    --border-strong: #3D4451;
    --text: #E6EDF3;
    --text-dim: #9198A1;
    --text-faint: #6E7681;
    --accent: #3B82F6;
    --accent-dim: rgba(59,130,246,0.15);
    --accent-emphasis: #63A0FF;
    --success: #3FB950;
    --success-dim: rgba(63,185,80,0.15);
    --warn: #D2A24C;
    --warn-dim: rgba(210,162,76,0.16);
    --danger: #F85149;
    --danger-dim: rgba(248,81,73,0.15);
    --radius-sm: 7px;
    --radius-md: 11px;
    --radius-lg: 16px;
    --shadow-card: 0 1px 2px rgba(0,0,0,.35), 0 10px 28px -14px rgba(0,0,0,.55);
    --ease: cubic-bezier(.16,.84,.44,1);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, Tahoma, 'Segoe UI', sans-serif;
    direction: rtl; line-height: 1.5;
  }
  body::before {
    content: ""; position: fixed; top: 0; right: 0; left: 0; height: 3px; z-index: 50;
    background: linear-gradient(90deg, var(--accent), var(--warn));
  }
  ::selection { background: var(--accent-dim); color: var(--text); }
  a { color: var(--accent-emphasis); }

  /* ---- accessible focus ring everywhere, independent of mouse/touch defaults ---- */
  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent-emphasis); outline-offset: 2px; border-radius: 4px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  .wrap { max-width: 460px; margin: 0 auto; padding: 22px 18px 64px; }
  .center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

  /* ---- typography ---- */
  .brand {
    text-align: center; font-weight: 800; font-size: 25px; color: var(--text);
    margin: 8px 0 2px; letter-spacing: -0.01em;
  }
  .brand-sub { font-size: 12px; color: var(--text-faint); text-align: center; margin: 0 0 4px; letter-spacing: 0.02em; }
  .subtitle { font-size: 12.5px; color: var(--text-dim); text-align: center; margin: 0 0 22px; }
  .footnote { font-size: 11.5px; color: var(--text-faint); text-align: center; margin-top: 16px; line-height: 1.9; }
  .trust-line { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11.5px; color: var(--text-faint); margin-top: 14px; }
  .trust-line svg { flex-shrink: 0; opacity: .7; }

  /* ---- letterhead (main screen header) ---- */
  .letterhead { margin-bottom: 18px; }
  .letterhead-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .text-link {
    background: none; border: none; color: var(--text-dim); font-size: 12.5px; font-family: inherit;
    display: flex; align-items: center; gap: 5px; padding: 6px 2px; cursor: pointer; border-radius: 6px;
  }
  .text-link:hover { color: var(--text); }
  .count-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .rule { height: 1px; background: var(--border); margin-top: 14px; }

  .stats-row { display: flex; gap: 8px; margin-top: 14px; }
  .stat-chip {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 9px 10px; text-align: center;
  }
  .stat-chip strong { display: block; font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .stat-chip span { display: block; font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }
  .stat-chip.backup-ok strong { color: var(--success); }
  .stat-chip.backup-warn strong { color: var(--warn); }
  .stat-chip.backup-warn { border-color: rgba(210,162,76,0.35); }

  /* ---- generic surfaces ---- */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 22px 20px; box-shadow: var(--shadow-card); }
  .icon-badge {
    width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
    background: var(--accent-dim); color: var(--accent-emphasis);
  }

  label.field-hint { display:block; font-size: 10.5px; color: var(--text-faint); margin: 0 0 5px 2px; letter-spacing: 0.03em; }

  input[type=text], input[type=password], input[type=date], textarea {
    width: 100%; border-radius: var(--radius-sm); padding: 11px 13px; font-size: 14px; outline: none;
    background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
    font-family: inherit; margin-bottom: 10px; direction: rtl; transition: border-color .15s, box-shadow .15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  textarea.mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  button { font-family: inherit; cursor: pointer; border: none; }

  .btn-primary {
    width: 100%; border-radius: var(--radius-sm); padding: 13px; font-size: 14px; font-weight: 600;
    background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background 0.15s, transform .1s;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-emphasis); }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-ghost {
    width: 100%; background: none; color: var(--accent-emphasis); opacity: 1; font-size: 11.5px; padding: 10px; text-align: center;
  }
  .btn-ghost:hover { text-decoration: underline; }
  .error-text { color: var(--danger); font-size: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12.5px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .checkbox-row input { width: auto; margin: 0; accent-color: var(--accent); }

  /* ---- quick backup pill ---- */
  .backup-quick {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px; border-radius: var(--radius-sm);
    padding: 11px; font-size: 12.5px; font-weight: 600; margin-bottom: 18px;
    background: var(--success-dim); color: var(--success); border: 1px solid rgba(63,185,80,0.35);
    transition: background .15s, transform .1s;
  }
  .backup-quick:active { transform: scale(0.98); }
  .backup-quick.copied { background: rgba(63,185,80,0.3); }
  .backup-quick.warn { background: var(--warn-dim); color: var(--warn); border-color: rgba(210,162,76,0.4); }

  /* ---- add-customer form ---- */
  .add-form { border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); }
  .field-label { font-size: 10.5px; color: var(--text-faint); letter-spacing: 0.04em; margin: 0 0 5px 2px; }
  .row-flex { display: flex; gap: 8px; }
  .row-flex input { flex: 1; }
  .add-btn {
    border-radius: var(--radius-sm); padding: 0 16px; display: flex; align-items: center; justify-content: center;
    background: var(--accent); color: #fff; transition: background .15s, transform .1s;
  }
  .add-btn:hover:not(:disabled) { background: var(--accent-emphasis); }
  .add-btn:active:not(:disabled) { transform: scale(0.94); }
  .add-btn:disabled { opacity: 0.3; }
  .mini-btn {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); font-size: 11.5px;
    padding: 7px 12px; border-radius: 20px; display: flex; align-items: center; gap: 5px; font-family: inherit;
  }
  .mini-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .mini-btn:active { transform: scale(0.96); }

  /* ---- autocomplete (customer name + item name) ---- */
  .ac-wrap { position: relative; }
  .ac-wrap input { margin-bottom: 0; }
  .ac-dropdown {
    position: absolute; top: calc(100% + 4px); right: 0; left: 0; z-index: 40; background: var(--surface-3);
    border: 1px solid var(--border-strong); border-radius: var(--radius-sm); max-height: 190px; overflow-y: auto;
    box-shadow: var(--shadow-card);
  }
  .ac-item { padding: 9px 12px; font-size: 12.5px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ac-item:hover { background: var(--surface-2); }
  .ac-item-count { font-size: 10px; color: var(--text-faint); white-space: nowrap; }

  /* ---- purchase item rows in the add/edit form ---- */
  .item-row { display: flex; gap: 6px; align-items: center; }
  .item-row input { margin-bottom: 0; }
  .item-name-wrap { flex: 2; min-width: 0; }
  .item-qty-input { width: 52px; flex-shrink: 0; text-align: center; padding-left: 4px !important; padding-right: 4px !important; }
  .item-desc-input { flex: 1; min-width: 0; }
  .item-row-remove {
    background: none; color: var(--text-faint); padding: 6px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; min-width: 28px; min-height: 28px;
  }
  .item-row-remove:hover { color: var(--danger); background: var(--danger-dim); }

  /* ---- expandable purchase history under a ticket ---- */
  .purchase-history { margin-top: 8px; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; flex-direction: column; gap: 12px; }
  .purchase-entry { display: flex; flex-direction: column; gap: 6px; padding-bottom: 12px; border-bottom: 1px dashed var(--border); }
  .purchase-entry:last-child { padding-bottom: 0; border-bottom: none; }
  .item-chip { display: inline-block; background: var(--surface-3); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; font-size: 11px; margin: 2px 4px 2px 0; color: var(--text-dim); }
  .other-purchases-toggle {
    background: none; border: none; color: var(--accent-emphasis); font-size: 11px; padding: 2px 0; margin-top: 2px;
    display: flex; align-items: center; gap: 5px; font-family: inherit; cursor: pointer; align-self: flex-start;
  }
  .other-purchases-toggle:hover { text-decoration: underline; }
  .del-customer-btn { cursor: pointer; }
  .del-customer-btn:hover { text-decoration: underline; }

  /* ---- search ---- */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input { padding-right: 38px; padding-left: 34px; margin-bottom: 0; }
  .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-faint); display: flex; pointer-events: none; }
  .search-clear {
    position: absolute; left: 6px; top: 50%; transform: translateY(-50%); background: none; color: var(--text-faint);
    width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .search-clear:hover { color: var(--text); background: var(--surface-3); }

  .list { display: flex; flex-direction: column; gap: 12px; }
  .empty-note { text-align: center; font-size: 12.5px; color: var(--text-faint); padding: 40px 12px; }
  .empty-note svg { display: block; margin: 0 auto 12px; opacity: .55; }
  .empty-note strong { display: block; color: var(--text-dim); font-size: 13.5px; margin-bottom: 4px; font-weight: 600; }

  /* ---- month accordion ---- */
  .cust-groups { display: flex; flex-direction: column; }
  .month-group { margin-bottom: 18px; }
  .month-group:last-child { margin-bottom: 0; }
  .month-header {
    width: 100%; background: none; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 2px 12px; margin-bottom: 14px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
  }
  .month-header:hover .month-title { color: var(--accent-emphasis); }
  .month-title { font-size: 13.5px; font-weight: 700; color: var(--text); letter-spacing: 0.01em; transition: color 0.15s; }
  .month-meta { display: flex; align-items: center; gap: 9px; }
  .month-count { font-size: 11px; color: var(--text-faint); font-weight: 500; white-space: nowrap; }
  .month-chevron { display: flex; color: var(--text-faint); transition: transform 0.2s var(--ease); }
  .month-chevron.open { transform: rotate(180deg); }
  .month-body { display: flex; flex-direction: column; }
  .month-body.collapsed { display: none; }

  /* ---- day separators: generous spacing + a fading rule, like tabs in a ledger ---- */
  .day-group { margin-top: 26px; }
  .day-group:first-child { margin-top: 0; }
  .day-divider { display: flex; align-items: center; gap: 10px; margin: 0 0 12px 2px; }
  .day-divider-label { font-size: 10.5px; color: var(--text-faint); font-weight: 600; letter-spacing: 0.03em; white-space: nowrap; }
  .day-divider-line { flex: 1; height: 1px; background: linear-gradient(to left, var(--border), transparent 88%); }

  /* ---- ticket card: a receipt-stub metaphor — wide "big end" (name) joined to a
     narrow "small end" (code) by a dashed perforation, like tearing a ticket in half ---- */
  .ticket {
    display: flex; align-items: stretch; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-md); overflow: hidden; transition: border-color 0.15s, transform .1s;
  }
  .ticket:active { transform: scale(0.995); }
  .ticket-main { flex: 1; min-width: 0; padding: 13px 14px; display: flex; flex-direction: column; gap: 5px; justify-content: center; }
  .name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .reveal-toggle {
    background: none; border: none; padding: 2px 0; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    min-height: 28px;
  }
  .reveal-toggle.masked { color: var(--text-faint); font-weight: 500; }
  .reveal-toggle svg { flex-shrink: 0; opacity: 0.6; }
  .date-chip { font-size: 10px; padding: 3px 8px; border-radius: 20px; background: var(--accent-dim); color: var(--accent-emphasis); white-space: nowrap; }
  .ticket-note { font-size: 11.5px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
  .ticket-stub {
    width: 94px; flex-shrink: 0; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 6px; background: var(--surface-2); border-right: 1.5px dashed var(--border-strong);
  }
  .ticket-stub::before, .ticket-stub::after {
    content: ""; position: absolute; right: -5px; width: 9px; height: 9px; border-radius: 50%; background: var(--bg); z-index: 2;
  }
  .ticket-stub::before { top: -1px; }
  .ticket-stub::after { bottom: -1px; }
  .code-ring {
    width: 52px; height: 52px; min-height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: var(--surface); position: relative; flex-shrink: 0; padding: 0; border: none; cursor: pointer;
  }
  .code-ring::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%; padding: 2.5px;
    background: conic-gradient(var(--gauge-color) 0deg 300deg, var(--border) 300deg 360deg);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
  }
  .code-ring::after {
    content: ""; position: absolute; top: 5px; right: 23px; width: 3px; height: 3px; border-radius: 50%;
    background: var(--gauge-color);
  }
  .ticket-code {
    font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 600; letter-spacing: 0.01em; color: var(--text);
    background: none; border: none; padding: 0; line-height: 1.1; text-align: center; z-index: 1;
  }
  .ticket-actions { display: flex; gap: 10px; }
  .ticket-actions button { background: none; border: none; color: var(--text-faint); padding: 6px; display: flex; border-radius: 6px; min-width: 30px; min-height: 30px; align-items:center; justify-content:center; }
  .ticket-actions button:hover { color: var(--text); background: var(--surface-3); }
  .ticket-actions .danger:hover { color: var(--danger); background: var(--danger-dim); }

  /* ---- inline edit mode ---- */
  .edit-card { flex-direction: column; align-items: stretch; gap: 8px; padding: 14px; border-radius: var(--radius-md) !important; min-height: 0 !important; }
  .edit-card input, .edit-card textarea { margin-bottom: 0; }
  .edit-p-items { display: flex; flex-direction: column; gap: 6px; }
  .edit-actions { display: flex; gap: 8px; }
  .edit-actions button { flex: 1; padding: 11px; border-radius: var(--radius-sm); font-size: 12.5px; font-weight: 600; }
  .edit-save { background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .edit-save:hover { background: var(--accent-emphasis); }
  .edit-cancel { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  /* ---- backup panel ---- */
  .backup-panel-toggle {
    width: 100%; background: none; border: none; color: var(--text-dim); font-size: 12px; padding: 8px 0;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .backup-panel-toggle:hover { color: var(--text); }
  .backup-block { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
  .footer-note { font-size: 11px; color: var(--text-faint); text-align: center; margin-top: 26px; line-height: 1.8; }
  .hidden { display: none !important; }

  /* ---- toasts ---- */
  .toast-root { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 200; pointer-events: none; padding: 0 18px; }
  .toast {
    max-width: 420px; width: 100%; background: var(--surface-3); border: 1px solid var(--border-strong); color: var(--text);
    font-size: 12.5px; padding: 11px 14px; border-radius: var(--radius-sm); box-shadow: var(--shadow-card);
    opacity: 0; transform: translateY(10px); transition: opacity .2s var(--ease), transform .2s var(--ease); text-align: center;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.toast-warn { border-color: rgba(210,162,76,0.5); color: var(--warn); }
  .toast.toast-danger { border-color: rgba(248,81,73,0.5); color: var(--danger); }
</style>
</head>
<body>

<div id="app"></div>
<div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

<script>
// ---------- icons (minimal inline SVGs, stroke-based) ----------
const ICONS = {

// =====================================================================
// CRYPTO — unchanged from the original: PBKDF2 (150k iters, SHA-256) +
// AES-256-GCM. Do not alter these parameters; existing vaults and backup
// texts are only decryptable if they match exactly.
// =====================================================================
function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64ToBuf(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function deriveKey(passphrase, saltB64) {
  const enc = new TextEncoder();
  const salt = b64ToBuf(saltB64);
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 150000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}
async function encryptJSON(key, dataObj) {
  const enc = new TextEncoder();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const cipherBuf = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(JSON.stringify(dataObj)));
  return { iv: bufToB64(iv), data: bufToB64(cipherBuf) };
}
async function decryptJSON(key, payload) {
  const dec = new TextDecoder();
  const iv = new Uint8Array(b64ToBuf(payload.iv));
  const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, b64ToBuf(payload.data));
  return JSON.parse(dec.decode(plainBuf));
}
const CODE_ALPHABET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no O, I, 0, 1 — avoids confusion on handwritten receipts
function randomCode(len = 4) {
  const arr = crypto.getRandomValues(new Uint8Array(len));
  let out = "";
  for (let i = 0; i < len; i++) out += CODE_ALPHABET[arr[i] % CODE_ALPHABET.length];
  return out;
}
function formatPersianDate(isoDate) {
  if (!isoDate) return "";
  try {
    return new Date(isoDate + "T00:00:00").toLocaleDateString("fa-IR", { year: "numeric", month: "long", day: "numeric" });
  } catch { return isoDate; }
}
function timeAgoFa(ts) {
  if (!ts) return null;
  const days = Math.floor((Date.now() - ts) / 86400000);
  if (days <= 0) return "امروز";
  if (days === 1) return "دیروز";
  if (days < 30) return `${days} روز پیش`;
  return `${Math.floor(days / 30)} ماه پیش`;
}
function haptic(ms = 10) {
  if (navigator.vibrate) { try { navigator.vibrate(ms); } catch (e) {} }
}

// Deterministic color per customer name — same (normalized) name always gets the same color.
const COLOR_PALETTE = [
  "#B5651D", "#8B3A3A", "#4B6F44", "#1F7A6C", "#2A6F97",
  "#3B4C99", "#6B4C9A", "#9A4C8C", "#B23A5E", "#6B4226",
  "#5C6B73", "#8A5A2B", "#A98307", "#4C7A9E"
];
function colorForName(name) {
  const norm = (name || "").trim().toLowerCase();
  let hash = 0;
  for (let i = 0; i < norm.length; i++) hash = (hash * 131 + norm.charCodeAt(i)) >>> 0;
  return COLOR_PALETTE[hash % COLOR_PALETTE.length];
}
function hexToRgba(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}
function genId() {
  return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
}
// Normalizes Persian text for matching: unifies zero-width-non-joiner/spaces and
// the Arabic/Persian ي-ی and ك-ک variants, so "نیم فاصله" style differences don't
// break search or duplicate-customer detection.
function normalizeFa(s) {
  return (s || "")
    .replace(/\u200c/g, " ")
    .replace(/ي/g, "ی")
    .replace(/ك/g, "ک")
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();
}

// Robust clipboard copy: modern API first, legacy execCommand fallback.
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
  }
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.top = "-9999px"; ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}

// ---------- toasts (replace blocking alert() with a calm, non-blocking notice) ----------
function showToast(msg, type = "default", ms = 2600) {
  const root = document.getElementById("toastRoot");
  if (!root) return;
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.setAttribute("role", "status");
  el.textContent = msg;
  root.appendChild(el);
  requestAnimationFrame(() => el.classList.add("show"));
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => el.remove(), 250);
  }, ms);
}

// =====================================================================
// MONTH / DAY GROUPING
// =====================================================================
// Migrates older vault data (single date/note per customer) into the new
// purchases-array shape. Safe to run on already-migrated data (no-op).
function migrateCustomers(list) {
  const usedSet = new Set();
  for (const c of (list || [])) {
    if (c.code) usedSet.add(c.code);
    for (const p of (c.purchases || [])) if (p.code) usedSet.add(p.code);
  }
  function freshCode() {
    let code = randomCode();
    while (usedSet.has(code)) code = randomCode();
    usedSet.add(code);
    return code;
  }
  return (list || []).map(c => {
    let purchases = c.purchases;
    if (!purchases) {
      purchases = [];
      if (c.date || c.note) {
        purchases.push({ id: genId(), date: c.date || "", createdAt: c.createdAt || Date.now(), items: [], note: c.note || "", code: c.code || freshCode() });
      }
    } else {
      // Older data (before per-purchase codes existed) may have purchases with no
      // code of their own. Give the old shared code to just one of them (so a
      // previously-issued paper receipt still matches), and a brand-new code to
      // any others — never reuse one code across multiple purchases.
      let legacyCodeUsed = false;
      purchases = purchases.map(p => {
        if (p.code) return p;
        if (c.code && !legacyCodeUsed) { legacyCodeUsed = true; return { ...p, code: c.code }; }
        return { ...p, code: freshCode() };
      });
    }
    return { ...c, purchases };
  });
}
// Recomputed on demand (not persisted separately) so edits/deletes of purchases
// are always reflected without a separate counter to keep in sync.
function computeProductUsage() {
  const map = {};
  for (const c of state.customers) {
    for (const p of (c.purchases || [])) {
      for (const it of (p.items || [])) {
        const key = normalizeFa(it.name);
        if (!key) continue;
        if (!map[key]) map[key] = { displayName: it.name, count: 0, lastUsed: 0 };
        map[key].count++;
        map[key].displayName = it.name;
        const ts = p.createdAt || 0;
        if (ts > map[key].lastUsed) map[key].lastUsed = ts;
      }
    }
  }
  return map;
}
function purchaseSummary(p) {
  if (p.items && p.items.length) {
    return p.items.map(it => (it.qty && it.qty > 1 ? `${it.name} ×${it.qty}` : it.name)).join("، ");
  }
  return p.note || "";
}

// =====================================================================
// PURCHASE ROWS — the ticket list is now built one row per *purchase event*,
// not one row per customer. So the same customer (same name, same code)
// can appear as several tickets over time; each new purchase — whether for a
// brand-new customer or an existing one — becomes its own ticket at the top
// of today's group. A customer's other purchases are tucked behind an
// optional "N فروش دیگر" toggle on each of their tickets.
// =====================================================================
function purchaseRows(customers) {
  const rows = [];
  for (const c of customers) {
    for (const p of (c.purchases || [])) rows.push({ c, p });
  }
  return rows;
}
function rowDate(row) {
  const p = row.p;
  return p.date ? new Date(p.date + "T00:00:00") : new Date(p.createdAt || row.c.createdAt || Date.now());
}
function compareRowsDesc(a, b) {
  const diff = rowDate(b).getTime() - rowDate(a).getTime();
  if (diff !== 0) return diff;
  return (b.p.createdAt || 0) - (a.p.createdAt || 0);
}
function monthKeyRow(row) {
  const d = rowDate(row);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function monthLabel(key) {
  const [y, m] = key.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString("fa-IR", { year: "numeric", month: "long" });
}
function dayKeyRow(row) {
  const d = rowDate(row);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function dayLabel(key) {
  const [y, m, day] = key.split("-").map(Number);
  return new Date(y, m - 1, day).toLocaleDateString("fa-IR", { weekday: "long", day: "numeric", month: "long" });
}
function groupBy(list, keyFn) {
  const map = new Map();
  for (const item of list) {
    const k = keyFn(item);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(item);
  }
  return map;
}

function renderTicket(row) {
  const c = row.c, p = row.p;
  const rowKey = c.id + ":" + p.id;
  const accent = colorForName(c.name);

  if (state.editingPurchase && state.editingPurchase.customerId === c.id && state.editingPurchase.purchaseId === p.id) {
    return `
      <div class="ticket-wrap" data-rowkey="${rowKey}">
        <div class="ticket edit-card" style="border-color:${hexToRgba(accent, 0.55)}">
          <input type="text" class="edit-p-name" value="${escapeHtml(c.name)}" placeholder="نام مشتری" aria-label="ویرایش نام مشتری" />
          <div class="edit-p-items" id="editItems-${rowKey}"></div>
          <button type="button" class="mini-btn edit-p-addrow" data-rowkey="${rowKey}">${ICONS.plus} ردیف کالا</button>
          <textarea class="edit-p-note" rows="2" placeholder="توضیح کلی (اختیاری)" aria-label="توضیح کلی فروش">${escapeHtml(p.note || "")}</textarea>
          <input type="date" class="edit-p-date" value="${p.date || ""}" aria-label="تاریخ فروش" />
          <div class="edit-actions">
            <button class="edit-save save-purchase-edit-btn" data-rowkey="${rowKey}">${ICONS.save} ذخیره</button>
            <button class="edit-cancel cancel-purchase-edit-btn" data-rowkey="${rowKey}">لغو</button>
          </div>
        </div>
      </div>`;
  }

  const revealed = state.revealedIds.has(c.id);
  const otherSales = (c.purchases || []).filter(op => op.id !== p.id);
  const expanded = state.expandedIds.has(rowKey);
  const summary = purchaseSummary(p);
  return `
    <div class="ticket-wrap" data-rowkey="${rowKey}">
      <div class="ticket" style="border-color:${hexToRgba(accent, 0.55)}">
        <div class="ticket-main">
          <div class="name-row">
            <button class="reveal-toggle ${revealed ? "" : "masked"}" data-id="${c.id}" aria-pressed="${revealed}" aria-label="${revealed ? "پنهان کردن نام" : "نمایش نام"}" style="${revealed ? `color:${accent}` : ""}">
              ${revealed ? escapeHtml(c.name) : "نام پنهان"} ${revealed ? ICONS.eye : ICONS.eyeOff}
            </button>
            ${p.date ? `<span class="date-chip">${formatPersianDate(p.date)}</span>` : ""}
          </div>
          <p class="ticket-note">${escapeHtml(summary) || "بدون قلم کالا"}</p>
          ${otherSales.length ? `
            <button class="other-purchases-toggle" data-rowkey="${rowKey}">
              <span class="month-chevron ${expanded ? "open" : ""}" style="display:inline-flex">${ICONS.chevron}</span>
              ${otherSales.length} فروش دیگر به این مشتری
            </button>` : ""}
        </div>
        <div class="ticket-stub">
          <button class="code-ring copy-code-btn" data-code="${escapeHtml(p.code || "")}" data-id="${rowKey}" style="--gauge-color:${accent}" aria-label="کپی کد ${escapeHtml(p.code || "")}">
            <span class="ticket-code">${escapeHtml(p.code || "")}</span>
          </button>
          <div class="ticket-actions">
            <button class="edit-purchase-btn" data-cid="${c.id}" data-pid="${p.id}" title="ویرایش این فروش" aria-label="ویرایش این فروش">${ICONS.edit}</button>
            <button class="del-purchase-btn danger" data-key="${rowKey}" data-cid="${c.id}" data-pid="${p.id}" title="حذف این فروش" aria-label="حذف این فروش">${ICONS.trash}</button>
          </div>
        </div>
      </div>
      ${expanded ? buildOtherPurchasesHTML(c, otherSales) : ""}
    </div>`;
}

// Read-only glance at a customer's other sales — editing/deleting any of them
// happens from that sale's own primary ticket (findable by searching the
// customer's name, which lists all their tickets flat).
function buildOtherPurchasesHTML(c, otherSales) {
  const entries = otherSales.map(p => {
    const chips = (p.items || []).map(it =>
      `<span class="item-chip">${escapeHtml(it.name)}${it.qty && it.qty > 1 ? ` ×${it.qty}` : ""}${it.desc ? ` — ${escapeHtml(it.desc)}` : ""}</span>`
    ).join("");
    return `
      <div class="purchase-entry">
        <span class="day-divider-label" style="font-weight:600">${p.date ? formatPersianDate(p.date) : "بدون تاریخ"} <span style="font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--text-faint)">— ${escapeHtml(p.code || "")}</span></span>
        <div>${chips || '<span class="ticket-note">بدون قلم کالا</span>'}</div>
        ${p.note ? `<p class="ticket-note" style="white-space:normal">${escapeHtml(p.note)}</p>` : ""}
      </div>`;
  }).join("");
  return `<div class="purchase-history">
    ${entries}
    <button class="del-customer-btn" data-id="${c.id}" style="align-self:flex-start;color:var(--danger);background:none;font-size:11px;padding:4px 0">${ICONS.trash} حذف کامل این مشتری و همه سوابقش</button>
  </div>`;
}

function buildDayGroupsHTML(rows) {
  const days = groupBy(rows, dayKeyRow);
  let html = "";
  for (const [dk, list] of days) {
    html += `
      <div class="day-group">
        <div class="day-divider">
          <span class="day-divider-label">${dayLabel(dk)}</span>
          <span class="day-divider-line"></span>
        </div>
        <div class="list">${list.map(renderTicket).join("")}</div>
      </div>`;
  }
  return html;
}

function buildListHTML(rows) {
  if (rows.length === 0) {
    if (state.customers.length === 0) {
      return `<div class="empty-note">
        ${ICONS.key.replace('width="22" height="22"', 'width="30" height="30"')}
        <strong>هنوز مشتری‌ای ثبت نشده</strong>
        از فرم بالا اولین مشتری رو اضافه کن — یک کد رسید تصادفی براش ساخته می‌شه.
      </div>`;
    }
    return `<div class="empty-note"><strong>چیزی پیدا نشد</strong>با نام یا کد دیگه‌ای امتحان کن.</div>`;
  }
  const sorted = rows.slice().sort(compareRowsDesc);
  const searching = !!(state._query || "").trim();
  if (searching) {
    // while searching, show a flat list — grouping by month only helps when browsing, not hunting
    return `<div class="list">${sorted.map(renderTicket).join("")}</div>`;
  }
  const months = groupBy(sorted, monthKeyRow);
  let html = `<div class="cust-groups">`;
  for (const [mk, list] of months) {
    const collapsed = state.collapsedMonths.has(mk);
    html += `
      <div class="month-group">
        <button class="month-header" data-month="${mk}" aria-expanded="${!collapsed}">
          <span class="month-title">${monthLabel(mk)}</span>
          <span class="month-meta">
            <span class="month-count">${list.length} مورد</span>
            <span class="month-chevron ${collapsed ? "" : "open"}">${ICONS.chevron}</span>
          </span>
        </button>
        <div class="month-body ${collapsed ? "collapsed" : ""}">${buildDayGroupsHTML(list)}</div>
      </div>`;
  }
  html += `</div>`;
  return html;
}

function getFilteredRows() {
  const rows = purchaseRows(state.customers);
  const q = (state._query || "").trim().toLowerCase();
  if (!q) return rows;
  const qCode = q.replace(/\s/g, "");
  return rows.filter(({ c, p }) => c.name.toLowerCase().includes(q) || (p.code || "").toLowerCase().includes(qCode));
}

function bindListEvents() {
  document.querySelectorAll(".copy-code-btn").forEach(btn => {
    btn.onclick = () => copyCode(btn.dataset.code, btn.dataset.id);
  });
  document.querySelectorAll(".reveal-toggle").forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      if (state.revealedIds.has(id)) state.revealedIds.delete(id); else state.revealedIds.add(id);
      renderList();
    };
  });
  document.querySelectorAll(".month-header").forEach(btn => {
    btn.onclick = () => {
      const mk = btn.dataset.month;
      if (state.collapsedMonths.has(mk)) state.collapsedMonths.delete(mk); else state.collapsedMonths.add(mk);
      renderList();
    };
  });
  document.querySelectorAll(".other-purchases-toggle").forEach(btn => {
    btn.onclick = () => {
      const key = btn.dataset.rowkey;
      if (state.expandedIds.has(key)) state.expandedIds.delete(key); else state.expandedIds.add(key);
      renderList();
    };
  });
  document.querySelectorAll(".edit-purchase-btn").forEach(btn => {
    btn.onclick = () => { state.editingPurchase = { customerId: btn.dataset.cid, purchaseId: btn.dataset.pid }; renderList(); };
  });
  document.querySelectorAll(".del-purchase-btn").forEach(btn => {
    btn.onclick = () => confirmDeletePurchase(btn.dataset.cid, btn.dataset.pid);
  });
  document.querySelectorAll(".del-customer-btn").forEach(btn => {
    btn.onclick = () => confirmDelete(btn.dataset.id);
  });
  document.querySelectorAll(".edit-p-addrow").forEach(btn => {
    btn.onclick = () => {
      const container = document.getElementById(`editItems-${btn.dataset.rowkey}`);
      if (!container) return;
      const row = createItemRowEl(container);
      row.querySelector(".item-name-input").focus();
    };
  });
  document.querySelectorAll(".save-purchase-edit-btn").forEach(btn => {
    btn.onclick = () => savePurchaseEditInline(btn.dataset.rowkey);
  });
  document.querySelectorAll(".cancel-purchase-edit-btn").forEach(btn => {
    btn.onclick = () => { state.editingPurchase = null; renderList(); };
  });
  populatePurchaseEditRows();
}

// Fills the inline edit-card's item rows for whichever purchase is currently
// being edited (if any) — called every time the list re-renders.
function populatePurchaseEditRows() {
  if (!state.editingPurchase) return;
  const { customerId, purchaseId } = state.editingPurchase;
  const rowKey = customerId + ":" + purchaseId;
  const container = document.getElementById(`editItems-${rowKey}`);
  if (!container || container.childElementCount) return;
  const customer = state.customers.find(c => c.id === customerId);
  const purchase = customer && (customer.purchases || []).find(p => p.id === purchaseId);
  if (!purchase) return;
  if (purchase.items && purchase.items.length) {
    purchase.items.forEach(it => {
      const row = createItemRowEl(container);
      row.querySelector(".item-name-input").value = it.name;
      row.querySelector(".item-qty-input").value = it.qty || "";
      row.querySelector(".item-desc-input").value = it.desc || "";
    });
  } else {
    createItemRowEl(container);
  }
}

function savePurchaseEditInline(rowKey) {
  const [customerId, purchaseId] = rowKey.split(":");
  const customer = state.customers.find(c => c.id === customerId);
  if (!customer) { state.editingPurchase = null; renderList(); return; }
  const card = document.querySelector(`.ticket-wrap[data-rowkey="${rowKey}"] .edit-card`);
  if (!card) return;
  const newName = card.querySelector(".edit-p-name").value.trim();
  const date = card.querySelector(".edit-p-date").value;
  const note = card.querySelector(".edit-p-note").value.trim();
  const container = document.getElementById(`editItems-${rowKey}`);
  const items = [];
  container.querySelectorAll(".item-row").forEach(row => {
    const nm = row.querySelector(".item-name-input").value.trim();
    if (!nm) return;
    const qty = parseInt(row.querySelector(".item-qty-input").value, 10) || 1;
    const desc = row.querySelector(".item-desc-input").value.trim();
    items.push({ id: genId(), name: nm, qty, desc });
  });
  if (!items.length) return;
  if (newName) customer.name = newName;
  customer.purchases = (customer.purchases || []).map(p => p.id === purchaseId ? { ...p, date, note, items } : p);
  state.editingPurchase = null;
  persist();
  renderList();
  showToast("تغییرات ذخیره شد.");
}

function renderList() {
  const listEl = document.getElementById("custList");
  if (!listEl) return;
  listEl.innerHTML = buildListHTML(getFilteredRows());
  bindListEvents();
  const countEl = document.getElementById("custCountText");
  if (countEl) countEl.textContent = `${state.customers.length} مشتری`;
  updateStatsRow();
}

let pendingDeletePurchase = null;
function confirmDeletePurchase(customerId, purchaseId) {
  const key = customerId + ":" + purchaseId;
  if (pendingDeletePurchase === key) {
    const customer = state.customers.find(c => c.id === customerId);
    if (customer) customer.purchases = (customer.purchases || []).filter(p => p.id !== purchaseId);
    pendingDeletePurchase = null;
    persist();
    renderList();
    haptic(15);
  } else {
    pendingDeletePurchase = key;
    const btn = document.querySelector(`.del-purchase-btn[data-key="${key}"]`);
    if (btn) btn.innerHTML = ICONS.check;
  }
}

function monthCountThisMonth() {
  const now = new Date();
  const key = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
  let count = 0;
  for (const c of state.customers) {
    for (const p of (c.purchases || [])) {
      const d = p.date ? new Date(p.date + "T00:00:00") : new Date(p.createdAt || 0);
      const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      if (k === key) count++;
    }
  }
  return count;
}

function updateStatsRow() {
  const el = document.getElementById("statsRow");
  if (!el) return;
  const lastBackup = Number(localStorage.getItem(LAST_BACKUP_KEY)) || null;
  const stale = !lastBackup || (Date.now() - lastBackup) > 14 * 86400000;
  const backupText = lastBackup ? timeAgoFa(lastBackup) : "هرگز";
  el.innerHTML = `
    <div class="stat-chip"><strong>${state.customers.length}</strong><span>کل مشتری‌ها</span></div>
    <div class="stat-chip"><strong>${monthCountThisMonth()}</strong><span>این ماه</span></div>
    <div class="stat-chip ${stale ? "backup-warn" : "backup-ok"}"><strong>${backupText}</strong><span>آخرین پشتیبان</span></div>`;
}

// ---------- logic ----------
async function handleSetup() {
  state.error = "";
  const pass = document.getElementById("passInput").value;
  const pass2 = document.getElementById("passInput2").value;
  state.rememberMe = document.getElementById("rememberChk").checked;
  if (pass.length < 6) { state.error = "رمز باید حداقل ۶ کاراکتر باشد."; render(); return; }
  if (pass !== pass2) { state.error = "دو رمز با هم یکسان نیستند."; render(); return; }
  state.busy = true; render();

  const saltBytes = crypto.getRandomValues(new Uint8Array(16));
  const saltB64 = bufToB64(saltBytes.buffer);
  const key = await deriveKey(pass, saltB64);
  const payload = await encryptJSON(key, { customers: [], usedCodes: [] });

  localStorage.setItem(SALT_KEY, saltB64);
  localStorage.setItem(DATA_KEY, JSON.stringify(payload));
  if (state.rememberMe) {
    localStorage.setItem(REMEMBER_KEY, pass);
    const check = localStorage.getItem(REMEMBER_KEY);
    if (check !== pass) {
      showToast("نوشتن رمزِ به‌خاطرسپرده روی این مرورگر ناموفق بود. این پیام رو برام بفرست.", "warn", 5000);
    }
  } else {
    localStorage.removeItem(REMEMBER_KEY);
  }

  state.key = key; state.salt = saltB64; state.customers = []; state.usedCodes = [];
  state.phase = "unlocked"; state.busy = false;
  render();
}

async function unlockWithPassphrase(pass) {
  try {
    const saltB64 = localStorage.getItem(SALT_KEY);
    if (!saltB64) throw new Error("no-salt");
    const key = await deriveKey(pass, saltB64);
    let dataObj = { customers: [] };
    const raw = localStorage.getItem(DATA_KEY);
    if (raw) {
      try {
        const payload = JSON.parse(raw);
        dataObj = await decryptJSON(key, payload);
      } catch { throw new Error("wrong-passphrase"); }
    }
    state.key = key; state.salt = saltB64;
    state.customers = migrateCustomers(dataObj.customers || []);
    state.usedCodes = dataObj.usedCodes || [];
    state.phase = "unlocked";
    return true;
  } catch (e) {
    state.error = e.message === "no-salt"
      ? "هیچ دفتری قبلاً ساخته نشده."
      : "رمز اشتباه است.";
    return false;
  }
}

async function handleUnlock() {
  state.error = "";
  const pass = document.getElementById("passInput").value;
  if (!pass) { state.error = "رمز را وارد کن."; render(); return; }
  state.rememberMe = document.getElementById("rememberChk").checked;
  state.busy = true; render();
  const ok = await unlockWithPassphrase(pass);
  if (ok) {
    if (state.rememberMe) {
      localStorage.setItem(REMEMBER_KEY, pass);
      const check = localStorage.getItem(REMEMBER_KEY);
      if (check !== pass) {
        showToast("نوشتن روی حافظه‌ی مرورگر ناموفق بود. این پیام رو برام بفرست.", "warn", 5000);
      }
    } else {
      localStorage.removeItem(REMEMBER_KEY);
    }
  }
  state.busy = false;
  render();
}

async function handleRestoreFromText() {
  state.error = "";
  const pass = document.getElementById("passInput").value;
  const backupTextRaw = (document.getElementById("restoreText") || {}).value || "";
  if (!pass) { state.error = "رمز را وارد کن."; render(); return; }
  if (!backupTextRaw.trim()) { state.error = "متن پشتیبان را پیست کن."; render(); return; }
  state.busy = true; render();
  try {
    const backupObj = JSON.parse(backupTextRaw.trim());
    const key = await deriveKey(pass, backupObj.salt);
    const dataObj = await decryptJSON(key, { iv: backupObj.iv, data: backupObj.data });
    state.key = key; state.salt = backupObj.salt;
    state.customers = migrateCustomers(dataObj.customers || []);
    state.usedCodes = dataObj.usedCodes || [];
    state.showRestore = false;
    state.phase = "unlocked";
    // save it into this browser's storage too, so next time it's there automatically
    localStorage.setItem(SALT_KEY, backupObj.salt);
    localStorage.setItem(DATA_KEY, JSON.stringify({ iv: backupObj.iv, data: backupObj.data }));
    state.rememberMe = document.getElementById("rememberChk") ? document.getElementById("rememberChk").checked : false;
    if (state.rememberMe) localStorage.setItem(REMEMBER_KEY, pass); else localStorage.removeItem(REMEMBER_KEY);
    markBackedUp();
  } catch (e) {
    state.error = "متن پشتیبان یا رمز عبور درست نیست.";
  }
  state.busy = false;
  render();
}

function persist() {
  (async () => {
    if (!state.key) return;
    const payload = await encryptJSON(state.key, { customers: state.customers, usedCodes: state.usedCodes });
    localStorage.setItem(DATA_KEY, JSON.stringify(payload));
  })();
}

// =====================================================================
// PURCHASE FORM — item rows and autocomplete are managed with direct DOM
// manipulation (not re-rendered from state) so typing in one row never
// wipes out values in another row or drops the mobile keyboard focus.
// =====================================================================
function closeAllDropdowns() {
  document.querySelectorAll(".ac-dropdown").forEach(d => d.remove());
}

function showCustomerSuggestions(inputEl) {
  const wrap = inputEl.closest(".ac-wrap");
  closeAllDropdowns();
  const q = normalizeFa(inputEl.value);
  if (!q || !wrap) return;
  const seen = new Set();
  const matches = [];
  for (const c of state.customers) {
    const norm = normalizeFa(c.name);
    if (norm.includes(q) && !seen.has(norm)) {
      seen.add(norm);
      matches.push(c);
      if (matches.length >= 6) break;
    }
  }
  if (!matches.length) return;
  const dd = document.createElement("div");
  dd.className = "ac-dropdown";
  dd.innerHTML = matches.map(c =>
    `<div class="ac-item" data-name="${escapeHtml(c.name)}"><span>${escapeHtml(c.name)}</span><span class="ac-item-count">${(c.purchases || []).length} فروش قبلی</span></div>`
  ).join("");
  wrap.appendChild(dd);
  dd.querySelectorAll(".ac-item").forEach(el => {
    el.onclick = () => {
      inputEl.value = el.dataset.name;
      dd.remove();
      updateSubmitState();
      const firstItemInput = document.querySelector("#itemRowsContainer .item-name-input");
      if (firstItemInput) firstItemInput.focus();
    };
  });
}

function showProductSuggestions(inputEl) {
  const wrap = inputEl.closest(".ac-wrap");
  closeAllDropdowns();
  const q = normalizeFa(inputEl.value);
  if (!q || !wrap) return;
  const usage = computeProductUsage();
  const matches = Object.values(usage)
    .filter(u => normalizeFa(u.displayName).includes(q))
    .sort((a, b) => b.count - a.count)
    .slice(0, 6);
  if (!matches.length) return;
  const dd = document.createElement("div");
  dd.className = "ac-dropdown";
  dd.innerHTML = matches.map(m =>
    `<div class="ac-item" data-name="${escapeHtml(m.displayName)}"><span>${escapeHtml(m.displayName)}</span><span class="ac-item-count">${m.count}×</span></div>`
  ).join("");
  wrap.appendChild(dd);
  dd.querySelectorAll(".ac-item").forEach(el => {
    el.onclick = () => {
      inputEl.value = el.dataset.name;
      dd.remove();
      updateSubmitState();
      const row = inputEl.closest(".item-row");
      if (row) row.querySelector(".item-qty-input").select();
    };
  });
}

function handleRowKeydown(e, containerEl, rowEl, field) {
  if (e.key !== "Enter") return;
  // if a suggestion dropdown is open for this field, let its own click handle selection
  if (rowEl.querySelector(".ac-dropdown")) return;
  e.preventDefault();
  if (field === "name") {
    rowEl.querySelector(".item-qty-input").select();
  } else if (field === "qty") {
    rowEl.querySelector(".item-desc-input").focus();
  } else if (field === "desc") {
    const rows = Array.from(containerEl.querySelectorAll(".item-row"));
    const idx = rows.indexOf(rowEl);
    if (idx === rows.length - 1) {
      const newRow = createItemRowEl(containerEl);
      newRow.querySelector(".item-name-input").focus();
    } else {
      rows[idx + 1].querySelector(".item-name-input").focus();
    }
  }
}

function createItemRowEl(containerEl) {
  const wrap = document.createElement("div");
  wrap.className = "item-row";
  wrap.innerHTML = `
    <div class="ac-wrap item-name-wrap">
      <input type="text" class="item-name-input" placeholder="نام کالا" aria-label="نام کالا" />
    </div>
    <input type="number" class="item-qty-input" min="1" placeholder="تعداد (پیش‌فرض ۱)" aria-label="تعداد" />
    <input type="text" class="item-desc-input" placeholder="توضیح (اختیاری)" aria-label="توضیح کالا" />
    <button type="button" class="item-row-remove" aria-label="حذف ردیف">${ICONS.close}</button>
  `;
  containerEl.appendChild(wrap);
  const nameInput = wrap.querySelector(".item-name-input");
  const qtyInput = wrap.querySelector(".item-qty-input");
  const descInput = wrap.querySelector(".item-desc-input");
  const removeBtn = wrap.querySelector(".item-row-remove");

  nameInput.addEventListener("input", () => { showProductSuggestions(nameInput); updateSubmitState(); });
  nameInput.addEventListener("keydown", e => handleRowKeydown(e, containerEl, wrap, "name"));
  qtyInput.addEventListener("keydown", e => handleRowKeydown(e, containerEl, wrap, "qty"));
  descInput.addEventListener("keydown", e => handleRowKeydown(e, containerEl, wrap, "desc"));
  removeBtn.onclick = () => {
    const rows = containerEl.querySelectorAll(".item-row");
    if (rows.length <= 1) {
      nameInput.value = ""; qtyInput.value = ""; descInput.value = "";
      nameInput.focus();
      updateSubmitState();
    } else {
      wrap.remove();
      updateSubmitState();
    }
  };
  return wrap;
}

function updateSubmitState() {
  const btn = document.getElementById("submitPurchaseBtn");
  const nameEl = document.getElementById("newName");
  if (!btn || !nameEl) return;
  const name = nameEl.value.trim();
  const anyItem = Array.from(document.querySelectorAll("#itemRowsContainer .item-name-input")).some(i => i.value.trim());
  btn.disabled = !(name && anyItem);
}

// Rebuilds the item rows and pre-fills the form — either empty (add mode) or
// populated from an existing purchase (edit mode). Only touches the form's own
// elements, so it's safe to call after an add/save without disturbing the list.
function populateAddForm() {
  const container = document.getElementById("itemRowsContainer");
  const nameInput = document.getElementById("newName");
  const dateInput = document.getElementById("newDate");
  const noteInput = document.getElementById("newPurchaseNote");
  if (!container || !nameInput || !dateInput || !noteInput) return;
  container.innerHTML = "";
  nameInput.value = "";
  dateInput.value = state._newDate || new Date().toISOString().slice(0, 10);
  noteInput.value = "";
  createItemRowEl(container);
  updateSubmitState();
}

function wireAddForm() {
  const nameInput = document.getElementById("newName");
  nameInput.addEventListener("input", () => { showCustomerSuggestions(nameInput); updateSubmitState(); });
  nameInput.addEventListener("keydown", e => {
    if (e.key !== "Enter" || nameInput.closest(".ac-wrap").querySelector(".ac-dropdown")) return;
    e.preventDefault();
    const firstItemInput = document.querySelector("#itemRowsContainer .item-name-input");
    if (firstItemInput) firstItemInput.focus();
  });
  document.getElementById("addRowBtn").onclick = () => {
    const container = document.getElementById("itemRowsContainer");
    const row = createItemRowEl(container);
    row.querySelector(".item-name-input").focus();
  };
  const noteToggleBtn = document.getElementById("noteToggleBtn");
  if (noteToggleBtn) {
    noteToggleBtn.onclick = () => {
      const ta = document.getElementById("newPurchaseNote");
      ta.classList.toggle("hidden");
      if (!ta.classList.contains("hidden")) ta.focus();
    };
  }
  document.getElementById("submitPurchaseBtn").onclick = addPurchase;
}

function readItemRows() {
  const rows = document.querySelectorAll("#itemRowsContainer .item-row");
  const items = [];
  rows.forEach(row => {
    const name = row.querySelector(".item-name-input").value.trim();
    if (!name) return;
    const qty = parseInt(row.querySelector(".item-qty-input").value, 10) || 1;
    const desc = row.querySelector(".item-desc-input").value.trim();
    items.push({ id: genId(), name, qty, desc });
  });
  return items;
}

async function addPurchase() {
  const nameInput = document.getElementById("newName");
  const dateInput = document.getElementById("newDate");
  const noteInput = document.getElementById("newPurchaseNote");
  const name = nameInput.value.trim();
  if (!name) return;
  const items = readItemRows();
  if (!items.length) return;

  const normName = normalizeFa(name);
  let customer = state.customers.find(c => normalizeFa(c.name) === normName);
  let isNew = false;
  if (!customer) {
    isNew = true;
    customer = { id: genId(), name, createdAt: Date.now(), purchases: [] };
    state.customers = [customer, ...state.customers];
  }

  // Every sale gets its own fresh code — even for a repeat customer —
  // like a new claim-ticket number for each drop-off.
  const usedSet = new Set(state.usedCodes);
  let code = randomCode();
  while (usedSet.has(code)) code = randomCode();
  state.usedCodes = [...state.usedCodes, code];

  const purchase = { id: genId(), date: dateInput.value, createdAt: Date.now(), items, note: noteInput.value.trim(), code };
  customer.purchases = [purchase, ...(customer.purchases || [])];

  state._newDate = dateInput.value; // keep same date for consecutive adds
  persist();
  renderList();
  populateAddForm();
  haptic(12);
  showToast(isNew ? `«${name}» به‌عنوان مشتری جدید ثبت شد — کد: ${code}` : `فروش جدید برای «${name}» ثبت شد — کد: ${code}`);
}

let pendingDelete = null;
function confirmDelete(id) {
  if (pendingDelete === id) {
    state.customers = state.customers.filter(c => c.id !== id);
    persist();
    pendingDelete = null;
    renderList();
    haptic(15);
  } else {
    pendingDelete = id;
    const btn = document.querySelector(`.del-customer-btn[data-id="${id}"]`);
    if (btn) btn.innerHTML = ICONS.check + " مطمئنی؟ دوباره بزن";
  }
}

function copyCode(code, id) {
  const btn = document.querySelector(`.copy-code-btn[data-id="${id}"]`);
  copyToClipboard(code).then(ok => {
    haptic(8);
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = ok ? (ICONS.check + " " + code) : (ICONS.alert + " لمس‌کن نگه‌دار");
    setTimeout(() => { btn.innerHTML = original; }, 1500);
  });
}

function lock() {
  state.key = null; state.salt = null; state.customers = []; state.usedCodes = [];
  state._query = "";
  state.revealedIds = new Set();
  state.collapsedMonths = new Set();
  state.expandedIds = new Set();
  state.editingPurchase = null;
  state.phase = "unlock";
  render();
}

async function quickCopyBackup() {
  if (!state.key || !state.salt) return;
  const payload = await encryptJSON(state.key, { customers: state.customers, usedCodes: state.usedCodes });
  const backupObj = { v: 1, salt: state.salt, iv: payload.iv, data: payload.data };
  const text = JSON.stringify(backupObj);
  const ok = await copyToClipboard(text);
  if (ok) {
    state.quickCopied = true;
    markBackedUp();
    render();
    setTimeout(() => { state.quickCopied = false; render(); }, 1500);
  } else {
    // fallback: show the full backup panel with selectable text so they can copy manually
    state.showBackup = true;
    render();
    const ta = document.getElementById("backupText");
    if (ta) { ta.value = text; ta.focus(); ta.select(); }
    document.getElementById("backupPanel").classList.remove("hidden");
    state.error = "";
    showToast("کپی خودکار کار نکرد. متن پایین صفحه انتخاب شده — با انگشت لمس‌کن نگه‌دار و «Copy» رو بزن.", "warn", 4500);
  }
}

async function generateBackupText() {
  if (!state.key || !state.salt) return;
  const payload = await encryptJSON(state.key, { customers: state.customers, usedCodes: state.usedCodes });
  const backupObj = { v: 1, salt: state.salt, iv: payload.iv, data: payload.data };
  document.getElementById("backupText").value = JSON.stringify(backupObj);
}

function copyBackupText() {
  const ta = document.getElementById("backupText");
  const text = ta.value;
  const btn = document.getElementById("copyBackupBtn");
  const original = btn.innerHTML;
  copyToClipboard(text).then(ok => {
    if (ok) {
      btn.innerHTML = ICONS.check + " کپی شد";
      markBackedUp();
    } else {
      ta.focus(); ta.select();
      btn.innerHTML = ICONS.alert + " لمس‌کن نگه‌دار و Copy بزن";
    }
    setTimeout(() => { btn.innerHTML = original; }, 2000);
  });
}

document.addEventListener("click", e => {
  if (!e.target.closest(".ac-wrap")) closeAllDropdowns();
});

// ---------- init ----------
(async () => {
  const saltB64 = localStorage.getItem(SALT_KEY);
  if (!saltB64) { state.phase = "setup"; render(); return; }
  const remembered = localStorage.getItem(REMEMBER_KEY);
  if (remembered) {
    const ok = await unlockWithPassphrase(remembered);
    if (ok) { state.rememberMe = true; render(); return; }
    else { showToast("رمز ذخیره‌شده پیدا شد ولی باز کردن دفتر باهاش شکست خورد.", "warn", 4500); }
  } else {
    console.log("no remembered passphrase found in localStorage");
  }
  state.phase = "unlock";
  render();
})();
</script>

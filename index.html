<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Ali Bakhshi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --surface-2: #010409;
    --border: #30363D;
    --border-strong: #6E7681;
    --text: #E6EDF3;
    --text-dim: #8B949E;
    --text-faint: #6E7681;
    --accent: #2F81F7;
    --accent-dim: rgba(47,129,247,0.15);
    --accent-emphasis: #58A6FF;
    --success: #3FB950;
    --success-dim: rgba(63,185,80,0.15);
    --danger: #F85149;
    --danger-dim: rgba(248,81,73,0.15);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Vazirmatn', Tahoma, 'Segoe UI', sans-serif; direction: rtl;
  }
  .wrap { max-width: 460px; margin: 0 auto; padding: 28px 18px 56px; }
  .center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

  /* ---- typography ---- */
  .brand {
    text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Vazirmatn', sans-serif; font-weight: 800;
    font-size: 26px; color: var(--text); margin: 6px 0 2px; letter-spacing: -0.02em;
  }
  .subtitle { font-size: 12.5px; color: var(--text-dim); text-align: center; margin: 0 0 22px; }
  .footnote { font-size: 11px; color: var(--text-faint); text-align: center; margin-top: 16px; line-height: 1.8; }

  /* ---- letterhead (main screen header) ---- */
  .letterhead { margin-bottom: 20px; }
  .letterhead-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .text-link {
    background: none; border: none; color: var(--text-dim); font-size: 12.5px; font-family: inherit;
    display: flex; align-items: center; gap: 5px; padding: 4px 0; cursor: pointer;
  }
  .text-link:hover { color: var(--text); }
  .count-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .rule { height: 1px; background: var(--border); margin-top: 16px; }

  /* ---- generic surfaces ---- */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .icon-badge {
    width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
    background: var(--accent-dim); color: var(--accent-emphasis);
  }

  input[type=text], input[type=password], input[type=date], textarea {
    width: 100%; border-radius: 6px; padding: 11px 13px; font-size: 14px; outline: none;
    background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
    font-family: inherit; margin-bottom: 10px; direction: rtl;
  }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  textarea.mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  button { font-family: inherit; cursor: pointer; border: none; }

  .btn-primary {
    width: 100%; border-radius: 6px; padding: 12px; font-size: 14px; font-weight: 600;
    background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background 0.15s;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-emphasis); }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-ghost {
    width: 100%; background: none; color: var(--accent-emphasis); opacity: 1; font-size: 11.5px; padding: 10px; text-align: center;
  }
  .btn-ghost:hover { text-decoration: underline; }
  .error-text { color: var(--danger); font-size: 12px; margin-bottom: 10px; }

  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12.5px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .checkbox-row input { width: auto; margin: 0; accent-color: var(--accent); }

  /* ---- quick backup pill (success-style, like a GitHub status badge) ---- */
  .backup-quick {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px; border-radius: 6px;
    padding: 10px; font-size: 12.5px; font-weight: 600; margin-bottom: 18px;
    background: var(--success-dim); color: var(--success); border: 1px solid rgba(63,185,80,0.35);
  }
  .backup-quick.copied { background: rgba(63,185,80,0.28); }

  /* ---- add-customer form ---- */
  .add-form { border-radius: 8px; padding: 16px; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); }
  .field-label { font-size: 10.5px; color: var(--text-faint); letter-spacing: 0.04em; margin: 0 0 5px 2px; }
  .row-flex { display: flex; gap: 8px; }
  .row-flex input { flex: 1; }
  .add-btn {
    border-radius: 6px; padding: 0 16px; display: flex; align-items: center; justify-content: center;
    background: var(--accent); color: #fff;
  }
  .add-btn:hover:not(:disabled) { background: var(--accent-emphasis); }
  .add-btn:disabled { opacity: 0.3; }

  /* ---- search ---- */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input { padding-right: 38px; margin-bottom: 0; }
  .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-faint); display: flex; }

  .list { display: flex; flex-direction: column; gap: 12px; }
  .empty-note { text-align: center; font-size: 12.5px; color: var(--text-faint); padding: 44px 0; }

  /* ---- connecting-rod styled customer card: wide rounded "big end" (name) on one
     side, narrow rounded "small end" (code) on the other, joined by a straight shaft ---- */
  .ticket {
    display: flex; align-items: stretch; background: var(--surface); border: 2.5px solid var(--border);
    border-radius: 8px; overflow: hidden; transition: border-color 0.15s;
  }
  .ticket-main { flex: 1; min-width: 0; padding: 13px 14px; display: flex; flex-direction: column; gap: 5px; justify-content: center; }
  .name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .reveal-toggle {
    background: none; border: none; padding: 0; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .reveal-toggle.masked { color: var(--text-faint); font-weight: 500; }
  .reveal-toggle svg { flex-shrink: 0; opacity: 0.6; }
  .date-chip { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--accent-dim); color: var(--accent-emphasis); white-space: nowrap; }
  .ticket-note { font-size: 11.5px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
  .ticket-stub {
    width: 92px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 6px; background: var(--surface-2); border-right: 1px solid var(--border);
  }
  .code-ring {
    width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: var(--surface); position: relative; flex-shrink: 0; padding: 0; border: none; cursor: pointer;
  }
  .code-ring::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%; padding: 2.5px;
    background: conic-gradient(var(--gauge-color) 0deg 300deg, var(--border) 300deg 360deg);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
  }
  .code-ring::after {
    content: ""; position: absolute; top: 5px; right: 22px; width: 3px; height: 3px; border-radius: 50%;
    background: var(--gauge-color);
  }
  .ticket-code {
    font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 600; letter-spacing: 0.01em; color: var(--text);
    background: none; border: none; padding: 0; line-height: 1.1; text-align: center; z-index: 1;
  }
  .ticket-actions { display: flex; gap: 12px; }
  .ticket-actions button { background: none; border: none; color: var(--text-faint); padding: 2px; display: flex; }
  .ticket-actions button:hover { color: var(--text); }
  .ticket-actions .danger:hover { color: var(--danger); }

  /* ---- inline edit mode ---- */
  .edit-card { flex-direction: column; align-items: stretch; gap: 8px; padding: 14px; border-radius: 10px !important; min-height: 0 !important; }
  .edit-card input { margin-bottom: 0; }
  .edit-actions { display: flex; gap: 8px; }
  .edit-actions button { flex: 1; padding: 10px; border-radius: 6px; font-size: 12.5px; font-weight: 600; }
  .edit-save { background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .edit-save:hover { background: var(--accent-emphasis); }
  .edit-cancel { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  /* ---- backup panel ---- */
  .backup-panel-toggle {
    width: 100%; background: none; border: none; color: var(--text-dim); font-size: 12px; padding: 4px 0;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .backup-panel-toggle:hover { color: var(--text); }
  .backup-block { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

  .footer-note { font-size: 11px; color: var(--text-faint); text-align: center; margin-top: 26px; line-height: 1.8; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="app"></div>

// ---------- crypto helpers ----------
function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64ToBuf(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function deriveKey(passphrase, saltB64) {
  const enc = new TextEncoder();
  const salt = b64ToBuf(saltB64);
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 150000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}
async function encryptJSON(key, dataObj) {
  const enc = new TextEncoder();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const cipherBuf = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(JSON.stringify(dataObj)));
  return { iv: bufToB64(iv), data: bufToB64(cipherBuf) };
}
async function decryptJSON(key, payload) {
  const dec = new TextDecoder();
  const iv = new Uint8Array(b64ToBuf(payload.iv));
  const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, b64ToBuf(payload.data));
  return JSON.parse(dec.decode(plainBuf));
}
const CODE_ALPHABET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no O, I, 0, 1 — avoids confusion on handwritten receipts
function randomCode(len = 4) {
  const arr = crypto.getRandomValues(new Uint8Array(len));
  let out = "";
  for (let i = 0; i < len; i++) out += CODE_ALPHABET[arr[i] % CODE_ALPHABET.length];
  return out;
}
function formatPersianDate(isoDate) {
  if (!isoDate) return "";
  try {
    return new Date(isoDate + "T00:00:00").toLocaleDateString("fa-IR", { year: "numeric", month: "long", day: "numeric" });
  } catch { return isoDate; }
}

// Deterministic color per customer name — same (normalized) name always gets the same color,
// even added on a different day. Muted, distinct earth/jewel tones (kept apart from the
// brass/sage accents used elsewhere in the UI so they always read as "customer data").
const COLOR_PALETTE = [
  "#B5651D", "#8B3A3A", "#4B6F44", "#1F7A6C", "#2A6F97",
  "#3B4C99", "#6B4C9A", "#9A4C8C", "#B23A5E", "#6B4226",
  "#5C6B73", "#8A5A2B", "#A98307", "#4C7A9E"
];
function colorForName(name) {
  const norm = (name || "").trim().toLowerCase();
  let hash = 0;
  for (let i = 0; i < norm.length; i++) hash = (hash * 131 + norm.charCodeAt(i)) >>> 0;
  return COLOR_PALETTE[hash % COLOR_PALETTE.length];
}
function hexToRgba(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function buildListHTML(filtered) {
  if (filtered.length === 0) {
    return `<p class="empty-note">${state.customers.length === 0 ? "هنوز مشتری‌ای ثبت نشده — از بالا شروع کن." : "چیزی پیدا نشد."}</p>`;
  }
  return filtered.map(c => {
    if (state.editingId === c.id) {
      return `
        <div class="ticket edit-card" data-id="${c.id}" style="border-color:${hexToRgba(colorForName(c.name), 0.55)}">
          <input type="text" class="edit-name" value="${escapeHtml(c.name)}" placeholder="نام مشتری" />
          <input type="text" class="edit-note" value="${escapeHtml(c.note || "")}" placeholder="یادداشت" />
          <input type="date" class="edit-date" value="${c.date || ""}" />
          <div class="edit-actions">
            <button class="edit-save save-edit-btn" data-id="${c.id}">${ICONS.save} ذخیره</button>
            <button class="edit-cancel cancel-edit-btn" data-id="${c.id}">لغو</button>
          </div>
        </div>`;
    }
    const revealed = state.revealedIds.has(c.id);
    const accent = colorForName(c.name);
    return `
      <div class="ticket" data-id="${c.id}" style="border-color:${hexToRgba(accent, 0.55)}">
        <div class="ticket-main">
          <div class="name-row">
            <button class="reveal-toggle ${revealed ? "" : "masked"}" data-id="${c.id}" style="${revealed ? `color:${accent}` : ""}">
              ${revealed ? escapeHtml(c.name) : "نام پنهان"} ${revealed ? ICONS.eye : ICONS.eyeOff}
            </button>
            ${c.date ? `<span class="date-chip">${formatPersianDate(c.date)}</span>` : ""}
          </div>
          ${c.note ? `<p class="ticket-note">${escapeHtml(c.note)}</p>` : ""}
        </div>
        <div class="ticket-stub">
          <button class="code-ring copy-code-btn" data-code="${escapeHtml(c.code)}" data-id="${c.id}" style="--gauge-color:${accent}">
            <span class="ticket-code">${escapeHtml(c.code)}</span>
          </button>
          <div class="ticket-actions">
            <button class="edit-btn" data-id="${c.id}" title="ویرایش">${ICONS.edit}</button>
            <button class="del-btn danger" data-id="${c.id}" title="حذف">${ICONS.trash}</button>
          </div>
        </div>
      </div>`;
  }).join("");
}

function getFiltered() {
  return state.customers.filter(c => {
    const q = (state._query || "").trim().toLowerCase();
    if (!q) return true;
    return c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q.replace(/\s/g, ""));
  });
}

function bindListEvents() {
  document.querySelectorAll(".copy-code-btn").forEach(btn => {
    btn.onclick = () => copyCode(btn.dataset.code, btn.dataset.id);
  });
  document.querySelectorAll(".del-btn").forEach(btn => {
    btn.onclick = () => confirmDelete(btn.dataset.id);
  });
  document.querySelectorAll(".reveal-toggle").forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      if (state.revealedIds.has(id)) state.revealedIds.delete(id); else state.revealedIds.add(id);
      renderList();
    };
  });
  document.querySelectorAll(".edit-btn").forEach(btn => {
    btn.onclick = () => { state.editingId = btn.dataset.id; renderList(); };
  });
  document.querySelectorAll(".save-edit-btn").forEach(btn => {
    btn.onclick = () => saveEdit(btn.dataset.id);
  });
  document.querySelectorAll(".cancel-edit-btn").forEach(btn => {
    btn.onclick = () => { state.editingId = null; renderList(); };
  });
}

function renderList() {
  const listEl = document.getElementById("custList");
  if (!listEl) return;
  listEl.innerHTML = buildListHTML(getFiltered());
  bindListEvents();
  const countEl = document.getElementById("custCountText");
  if (countEl) countEl.textContent = `${state.customers.length} مشتری`;
}

function saveEdit(id) {
  const card = document.querySelector(`.ticket[data-id="${id}"]`);
  if (!card) return;
  const name = card.querySelector(".edit-name").value.trim();
  const note = card.querySelector(".edit-note").value.trim();
  const date = card.querySelector(".edit-date").value;
  if (!name) return;
  state.customers = state.customers.map(c => c.id === id ? { ...c, name, note, date } : c);
  state.editingId = null;
  persist();
  renderList();
}

const FARM_SCENE = `
<svg viewBox="0 0 300 92" width="100%" height="auto" style="max-width:230px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">
  <line x1="0" y1="80" x2="300" y2="80" style="stroke:var(--border);stroke-width:1.5"/>
  <g style="stroke:var(--border);stroke-width:1.5" stroke-linecap="round">
    <line x1="20" y1="86" x2="35" y2="86"/>

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

// Robust clipboard copy: tries the modern API, falls back to the old execCommand trick,
// and only reports success if one of them actually worked.
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (e) { /* fall through to legacy method */ }
  }
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.top = "-9999px";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

// ---------- storage (real browser localStorage — persists reliably on this device) ----------
const SALT_KEY = "vault_salt";
const DATA_KEY = "vault_data";
const REMEMBER_KEY = "vault_remember";

// ---------- state ----------
let state = {
  phase: "loading", // loading | setup | unlock | unlocked
  key: null,
  salt: null,
  customers: [],
  usedCodes: [], // every code ever issued — kept even after a customer is deleted, so codes never repeat
  error: "",
  busy: false,
  rememberMe: false,
  showBackup: false,
  backupCopied: false,
  quickCopied: false,
  revealedIds: new Set(),
  editingId: null,
};

function render() {
  const app = document.getElementById("app");
  if (state.phase === "loading") {
    app.innerHTML = `<div class="center-screen"><p style="opacity:.5;font-size:14px">در حال آماده‌سازی…</p></div>`;
    return;
  }
  if (state.phase === "setup" || state.phase === "unlock") {
    const isSetup = state.phase === "setup";
    app.innerHTML = `
      <div class="center-screen">
        <div style="width:100%;max-width:360px">
          <div class="icon-badge">${ICONS.key}</div>
          <h1 class="brand">Ali Bakhshi</h1>
          <p class="subtitle">${isSetup ? "یک رمز عبور برای این دفتر بساز" : "برای بازکردن دفتر، رمز را وارد کن"}</p>
          <div class="card">
            <input type="password" id="passInput" placeholder="رمز عبور" autofocus />
            ${isSetup && !state.showRestore ? `<input type="password" id="passInput2" placeholder="تکرار رمز عبور" />` : ""}
            ${state.error ? `<p class="error-text">${escapeHtml(state.error)}</p>` : ""}
            ${state.showRestore ? `
              <textarea class="mono" id="restoreText" rows="4" placeholder="متن پشتیبان را همین‌جا پیست کن…"></textarea>
            ` : ""}
            <label class="checkbox-row"><input type="checkbox" id="rememberChk" ${state.rememberMe ? "checked" : ""}/> این دستگاه رو به خاطر بسپار</label>
            <button class="btn-primary" id="mainBtn" ${state.busy ? "disabled" : ""}>
              ${state.busy ? "در حال بررسی…" : (state.showRestore ? ICONS.refresh + " بازیابی از پشتیبان" : (isSetup ? "ساخت دفتر" : "باز کردن"))}
            </button>
            <button class="btn-ghost" id="restoreToggle">${state.showRestore ? "بی‌خیال، برگرد" : "متن پشتیبان داری؟ همین‌جا بازیابی کن"}</button>
          </div>
          <p class="footnote">این رمز فقط پیش خودت می‌ماند و در هیچ‌جا (سروری) ذخیره نمی‌شود.<br/>اگر آن را فراموش کنی، داده‌های قبلی قابل بازیابی نیستند.</p>
          <p class="footnote" style="opacity:.5">وضعیت به‌خاطرسپاری در این مرورگر: ${localStorage.getItem(REMEMBER_KEY) ? "فعال" : "غیرفعال"}</p>
        </div>
      </div>`;
    document.getElementById("mainBtn").onclick = state.showRestore ? handleRestoreFromText : (isSetup ? handleSetup : handleUnlock);
    const p2 = document.getElementById("passInput2");
    if (p2) p2.addEventListener("keydown", e => { if (e.key === "Enter") handleSetup(); });
    document.getElementById("passInput").addEventListener("keydown", e => { if (e.key === "Enter") (state.showRestore ? handleRestoreFromText : (isSetup ? handleSetup : handleUnlock))(); });
    const rt = document.getElementById("restoreToggle");
    if (rt) rt.onclick = () => { state.showRestore = !state.showRestore; state.error = ""; render(); };
    return;
  }

  // unlocked
  const filtered = getFiltered();

  app.innerHTML = `
    <div class="wrap">
      <div class="letterhead">
        <div class="letterhead-row">
          <button class="text-link" id="lockBtn">${ICONS.lock} قفل کردن</button>
          <span class="count-label" id="custCountText">${state.customers.length} مشتری</span>
        </div>
        <h1 class="brand">Ali Bakhshi</h1>
        <div class="rule"></div>
      </div>

      <button class="backup-quick ${state.quickCopied ? "copied" : ""}" id="quickBackupBtn">
        ${state.quickCopied ? ICONS.check + " کپی شد" : ICONS.copy + " کپی پشتیبان (یک ضربه)"}
      </button>

      <div class="add-form">
        <div class="row-flex" style="margin-bottom:10px">
          <input type="text" id="newName" placeholder="نام مشتری جدید…" />
          <button class="add-btn" id="addBtn" disabled>${ICONS.plus}</button>
        </div>
        <div class="row-flex">
          <input type="text" id="newNote" placeholder="یادداشت اختیاری" style="flex:1" />
          <input type="date" id="newDate" style="width:150px" />
        </div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">${ICONS.search}</span>
        <input type="text" id="searchInput" placeholder="جستجو با نام یا کد رسید…" value="${escapeHtml(state._query || "")}" />
      </div>

      <div class="list" id="custList">${buildListHTML(filtered)}</div>

      <div class="backup-block">
        <button class="backup-panel-toggle" id="backupToggle">${ICONS.save} پشتیبان‌گیری کامل (نمایش متن)</button>
        <div id="backupPanel" class="hidden" style="margin-top:12px">
          <p class="footnote" style="margin-top:0">این متن رو کپی کن و جای امنی نگه‌دار.</p>
          <textarea class="mono" id="backupText" rows="4" readonly></textarea>
          <button class="btn-primary" id="copyBackupBtn" style="margin-top:8px">${ICONS.copy} کپی متن پشتیبان</button>
        </div>
      </div>

      <div style="margin-top:30px;opacity:0.9">${FARM_SCENE}</div>
    </div>`;

  document.getElementById("lockBtn").onclick = lock;
  document.getElementById("quickBackupBtn").onclick = quickCopyBackup;
  document.getElementById("newName").addEventListener("input", e => {
    document.getElementById("addBtn").disabled = !e.target.value.trim();
  });
  document.getElementById("newName").addEventListener("keydown", e => { if (e.key === "Enter") addCustomer(); });
  document.getElementById("addBtn").onclick = addCustomer;
  const dateInput = document.getElementById("newDate");
  dateInput.value = state._newDate || new Date().toISOString().slice(0, 10);
  // IMPORTANT: only update the list on each keystroke, never the whole page — otherwise the
  // input element gets destroyed and recreated every time, which closes the mobile keyboard.
  document.getElementById("searchInput").addEventListener("input", e => { state._query = e.target.value; renderList(); });
  bindListEvents();
  document.getElementById("backupToggle").onclick = () => {
    state.showBackup = !state.showBackup;
    if (state.showBackup) generateBackupText();
    document.getElementById("backupPanel").classList.toggle("hidden", !state.showBackup);
  };
  document.getElementById("copyBackupBtn").onclick = copyBackupText;
}


// ---------- logic ----------
async function handleSetup() {
  state.error = "";
  const pass = document.getElementById("passInput").value;
  const pass2 = document.getElementById("passInput2").value;
  state.rememberMe = document.getElementById("rememberChk").checked;
  if (pass.length < 6) { state.error = "رمز باید حداقل ۶ کاراکتر باشد."; render(); return; }
  if (pass !== pass2) { state.error = "دو رمز با هم یکسان نیستند."; render(); return; }
  state.busy = true; render();

  const saltBytes = crypto.getRandomValues(new Uint8Array(16));
  const saltB64 = bufToB64(saltBytes.buffer);
  const key = await deriveKey(pass, saltB64);
  const payload = await encryptJSON(key, { customers: [], usedCodes: [] });

  localStorage.setItem(SALT_KEY, saltB64);
  localStorage.setItem(DATA_KEY, JSON.stringify(payload));
  if (state.rememberMe) {
    localStorage.setItem(REMEMBER_KEY, pass);
    const check = localStorage.getItem(REMEMBER_KEY);
    if (check !== pass) {
      alert("تشخیص: نوشتن رمزِ به‌خاطرسپرده روی حافظه‌ی مرورگر ناموفق بود. این پیام رو برای من بفرست.");
    }
  } else {
    localStorage.removeItem(REMEMBER_KEY);
  }

  state.key = key; state.salt = saltB64; state.customers = []; state.usedCodes = [];
  state.phase = "unlocked"; state.busy = false;
  render();
}

async function unlockWithPassphrase(pass) {
  try {
    const saltB64 = localStorage.getItem(SALT_KEY);
    if (!saltB64) throw new Error("no-salt");
    const key = await deriveKey(pass, saltB64);
    let dataObj = { customers: [] };
    const raw = localStorage.getItem(DATA_KEY);
    if (raw) {
      try {
        const payload = JSON.parse(raw);
        dataObj = await decryptJSON(key, payload);
      } catch { throw new Error("wrong-passphrase"); }
    }
    state.key = key; state.salt = saltB64;
    state.customers = dataObj.customers || [];
    state.usedCodes = dataObj.usedCodes || [];
    state.phase = "unlocked";
    return true;
  } catch (e) {
    state.error = e.message === "no-salt"
      ? "هیچ دفتری قبلاً ساخته نشده."
      : "رمز اشتباه است.";
    return false;
  }
}

async function handleUnlock() {
  state.error = "";
  const pass = document.getElementById("passInput").value;
  if (!pass) { state.error = "رمز را وارد کن."; render(); return; }
  state.rememberMe = document.getElementById("rememberChk").checked;
  state.busy = true; render();
  const ok = await unlockWithPassphrase(pass);
  if (ok) {
    if (state.rememberMe) {
      localStorage.setItem(REMEMBER_KEY, pass);
      const check = localStorage.getItem(REMEMBER_KEY);
      if (check !== pass) {
        alert("تشخیص: نوشتن روی حافظه‌ی مرورگر ناموفق بود. لطفاً این پیام رو برای من بفرست.");
      }
    } else {
      localStorage.removeItem(REMEMBER_KEY);
    }
  }
  state.busy = false;
  render();
}

async function handleRestoreFromText() {
  state.error = "";
  const pass = document.getElementById("passInput").value;
  const backupTextRaw = (document.getElementById("restoreText") || {}).value || "";
  if (!pass) { state.error = "رمز را وارد کن."; render(); return; }
  if (!backupTextRaw.trim()) { state.error = "متن پشتیبان را پیست کن."; render(); return; }
  state.busy = true; render();
  try {
    const backupObj = JSON.parse(backupTextRaw.trim());
    const key = await deriveKey(pass, backupObj.salt);
    const dataObj = await decryptJSON(key, { iv: backupObj.iv, data: backupObj.data });
    state.key = key; state.salt = backupObj.salt;
    state.customers = dataObj.customers || [];
    state.usedCodes = dataObj.usedCodes || [];
    state.showRestore = false;
    state.phase = "unlocked";
    // save it into this browser's storage too, so next time it's there automatically
    localStorage.setItem(SALT_KEY, backupObj.salt);
    localStorage.setItem(DATA_KEY, JSON.stringify({ iv: backupObj.iv, data: backupObj.data }));
    state.rememberMe = document.getElementById("rememberChk") ? document.getElementById("rememberChk").checked : false;
    if (state.rememberMe) localStorage.setItem(REMEMBER_KEY, pass); else localStorage.removeItem(REMEMBER_KEY);
  } catch (e) {
    state.error = "متن پشتیبان یا رمز عبور درست نیست.";
  }
  state.busy = false;
  render();
}

function persist() {
  (async () => {
    if (!state.key) return;
    const payload = await encryptJSON(state.key, { customers: state.customers, usedCodes: state.usedCodes });
    localStorage.setItem(DATA_KEY, JSON.stringify(payload));
  })();
}

async function addCustomer() {
  const nameEl = document.getElementById("newName");
  const noteEl = document.getElementById("newNote");
  const dateEl = document.getElementById("newDate");
  const name = nameEl.value.trim();
  if (!name) return;
  const usedSet = new Set(state.usedCodes);
  let code = randomCode();
  while (usedSet.has(code)) code = randomCode();
  state.usedCodes = [...state.usedCodes, code];
  const entry = {
    id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
    name, note: noteEl.value.trim(), code, date: dateEl.value, createdAt: Date.now()
  };
  state.customers = [entry, ...state.customers];
  state._newDate = dateEl.value; // keep same date for consecutive adds
  nameEl.value = ""; noteEl.value = "";
  document.getElementById("addBtn").disabled = true;
  persist();
  renderList();
}

let pendingDelete = null;
function confirmDelete(id) {
  if (pendingDelete === id) {
    state.customers = state.customers.filter(c => c.id !== id);
    persist();
    pendingDelete = null;
    renderList();
  } else {
    pendingDelete = id;
    const btn = document.querySelector(`.del-btn[data-id="${id}"]`);
    if (btn) btn.innerHTML = ICONS.check;
  }
}

function copyCode(code, id) {
  const btn = document.querySelector(`.copy-code-btn[data-id="${id}"]`);
  copyToClipboard(code).then(ok => {
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = ok ? (ICONS.check + " " + code) : (ICONS.alert + " لمس‌کن نگه‌دار");
    setTimeout(() => { btn.innerHTML = original; }, 1500);
  });
}

function lock() {
  state.key = null; state.salt = null; state.customers = []; state.usedCodes = [];
  state._query = "";
  state.revealedIds = new Set();
  state.editingId = null;
  state.phase = "unlock";
  render();
}

async function quickCopyBackup() {
  if (!state.key || !state.salt) return;
  const payload = await encryptJSON(state.key, { customers: state.customers, usedCodes: state.usedCodes });
  const backupObj = { v: 1, salt: state.salt, iv: payload.iv, data: payload.data };
  const text = JSON.stringify(backupObj);
  const ok = await copyToClipboard(text);
  if (ok) {
    state.quickCopied = true;
    render();
    setTimeout(() => { state.quickCopied = false; render(); }, 1500);
  } else {
    // fallback: show the full backup panel with selectable text so they can copy manually
    state.showBackup = true;
    render();
    const ta = document.getElementById("backupText");
    if (ta) { ta.value = text; ta.focus(); ta.select(); }
    document.getElementById("backupPanel").classList.remove("hidden");
    state.error = "";
    alert("کپی خودکار کار نکرد. متن پشتیبان پایین صفحه انتخاب شده — با انگشت لمس‌کن نگه‌دار و «Copy» رو بزن.");
  }
}

async function generateBackupText() {
  if (!state.key || !state.salt) return;
  const payload = await encryptJSON(state.key, { customers: state.customers, usedCodes: state.usedCodes });
  const backupObj = { v: 1, salt: state.salt, iv: payload.iv, data: payload.data };
  document.getElementById("backupText").value = JSON.stringify(backupObj);
}

function copyBackupText() {
  const ta = document.getElementById("backupText");
  const text = ta.value;
  const btn = document.getElementById("copyBackupBtn");
  const original = btn.innerHTML;
  copyToClipboard(text).then(ok => {
    if (ok) {
      btn.innerHTML = ICONS.check + " کپی شد";
    } else {
      ta.focus(); ta.select();
      btn.innerHTML = ICONS.alert + " لمس‌کن نگه‌دار و Copy بزن";
    }
    setTimeout(() => { btn.innerHTML = original; }, 2000);
  });
}

// ---------- init ----------
(async () => {
  const saltB64 = localStorage.getItem(SALT_KEY);
  if (!saltB64) { state.phase = "setup"; render(); return; }
  const remembered = localStorage.getItem(REMEMBER_KEY);
  if (remembered) {
    const ok = await unlockWithPassphrase(remembered);
    if (ok) { state.rememberMe = true; render(); return; }
    else { alert("تشخیص: رمز ذخیره‌شده پیدا شد ولی باز کردن دفتر باهاش شکست خورد."); }
  } else {
    console.log("no remembered passphrase found in localStorage");
  }
  state.phase = "unlock";
  render();
})();
